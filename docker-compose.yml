services:
  api:
    build:
      context: ./server/Inviter.Api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Data Source=/data/inviter.db"
      Email__SmtpHost: ${SMTP_HOST:-}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SmtpUser: ${SMTP_USER:-}
      Email__SmtpPassword: ${SMTP_PASSWORD:-}
      Email__FromAddress: ${MAIL_FROM:-noreply@inviter.nu}
      Email__FromName: ${MAIL_FROM_NAME:-Inviter}
      Email__UseStartTls: ${SMTP_STARTTLS:-true}
      App__BaseUrl: ${APP_BASE_URL:-https://inviter.nu}
      App__DashboardSlug: ${APP_DASHBOARD_SLUG:-}
    volumes:
      - inviter-data:/data
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: ./client
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  inviter-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
